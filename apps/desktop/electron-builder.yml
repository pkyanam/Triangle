appId: ai.triangle.app
productName: Triangle
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
# Extra resources shipped alongside the app bundle:
#   1. The Triangle MCP server entry + its shared chunks + an ESM marker
#      package.json so the spawned node subprocess can resolve ESM imports
#      from outside asar (see ADR 0017). Lands at <resources>/mcp/.
#   2. The full templates/ directory (starter, fps, raymarch) so the app can
#      seed new projects on first run. Lands at <resources>/templates/,
#      matching ProjectManager.locateTemplatesDir().
extraResources:
  - from: out/main/mcp.js
    to: mcp/mcp.js
  - from: out/main/chunks
    to: mcp/chunks
  - from: build/mcp/package.json
    to: mcp/package.json
  - from: ../../templates
    to: templates
# Never auto-publish from electron-builder — the CI workflow handles release
# uploads via softprops/action-gh-release so we have full control over naming,
# release notes, and asset grouping.
publish: null
mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  # x64 and arm64 are built as separate jobs in CI (on native-arch runners)
  # so the download size stays small and we avoid cross-compilation pitfalls
  # with native modules. The CLI flag `--x64` / `--arm64` selects the arch.
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  # Code signing + notarization can be enabled later by setting these secrets
  # in the repo: APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID, and
  # CSC_LINK / CSC_KEY_PASSWORD for the signing certificate. When those are
  # present, flip hardenedRuntime to true and add entitlements files.
  hardenedRuntime: false
  gatekeeperAssess: false
  artifactName: Triangle-${version}-${arch}-mac.zip
dmg:
  artifactName: Triangle-${version}-${arch}.dmg
win:
  icon: build/icon.png
  target:
    - target: nsis
      arch:
        - x64
  artifactName: Triangle-Setup-${version}-${arch}.exe
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: Triangle-Setup-${version}-${arch}.exe
linux:
  icon: build/icon.png
  target:
    - target: AppImage
      arch:
        - x64
  category: Development
  artifactName: Triangle-${version}-${arch}.AppImage
