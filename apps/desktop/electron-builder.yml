appId: ai.triangle.app
productName: Triangle
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
# Extra resources shipped alongside the app bundle:
#   1. The Triangle MCP server entry + its shared chunks + an ESM marker
#      package.json so the spawned node subprocess can resolve ESM imports
#      from outside asar (see ADR 0017). Lands at <resources>/mcp/.
#   2. The full templates/ directory (starter, fps, raymarch) so the app can
#      seed new projects on first run. Lands at <resources>/templates/,
#      matching ProjectManager.locateTemplatesDir().
extraResources:
  - from: out/main/mcp.js
    to: mcp/mcp.js
  - from: out/main/chunks
    to: mcp/chunks
  - from: build/mcp/package.json
    to: mcp/package.json
  - from: ../../templates
    to: templates
# Never auto-publish from electron-builder — the CI workflow handles release
# uploads via softprops/action-gh-release so we have full control over naming,
# release notes, and asset grouping.
publish: null
# Ad-hoc sign the .app after packing so Apple Silicon doesn't reject it
# with "damaged and can't be opened" — but ONLY when no real signing
# certificate is configured (CSC_LINK absent). When CSC_LINK is provided
# (CI release builds), electron-builder signs with the real Developer ID
# certificate and after-pack.cjs skips the ad-hoc step so it doesn't
# overwrite the real signature. See build/after-pack.cjs.
afterPack: build/after-pack.cjs
mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  # arm64 only — macOS x64 builds are dropped due to GitHub runner
  # availability constraints for macos-13 (Intel). Re-enable x64 by adding
  # it back to the arch lists below when runner capacity improves.
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  # Hardened Runtime is required for notarized apps distributed outside the
  # Mac App Store. It's safe to leave on even for ad-hoc builds — the
  # after-pack.cjs ad-hoc signature simply won't enforce it, but the flag
  # doesn't break anything when no real cert is present.
  hardenedRuntime: true
  gatekeeperAssess: false
  # Entitlements required for Hardened Runtime + Electron. See
  # build/entitlements.mac.plist and build/entitlements.mac.inherit.plist.
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  # Built-in notarization via @electron/notarize. Activates only when the
  # APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, and APPLE_TEAM_ID env vars are
  # set (CI release builds). When they're absent, notarization is skipped
  # automatically — no error. See the Release workflow for secret wiring.
  notarize: true
  artifactName: Triangle-${version}-${arch}-mac.zip
dmg:
  artifactName: Triangle-${version}-${arch}.dmg
win:
  icon: build/icon.png
  target:
    - target: nsis
      arch:
        - x64
  artifactName: Triangle-Setup-${version}-${arch}.exe
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: Triangle-Setup-${version}-${arch}.exe
linux:
  icon: build/icon.png
  # executableName must be set explicitly — otherwise electron-builder derives
  # it from the package name "@triangle/desktop", which contains an invalid "@"
  # for file paths / WM_CLASS.
  executableName: triangle
  target:
    - target: AppImage
      arch:
        - x64
  category: Development
  artifactName: Triangle-${version}-${arch}.AppImage
