<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Triangle Web Preview</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #14161a;
        overflow: hidden;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #error {
        position: fixed;
        left: 12px;
        bottom: 12px;
        max-width: calc(100vw - 24px);
        padding: 8px 10px;
        font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #ff6b6b;
        background: rgba(20, 22, 26, 0.92);
        border: 1px solid #3a1f1f;
        border-radius: 6px;
        white-space: pre-wrap;
        display: none;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <pre id="error"></pre>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
