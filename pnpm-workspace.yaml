packages:
  - 'apps/*'
  - 'packages/*'

# Allow these dependencies to run their install scripts (e.g. Electron downloads
# its prebuilt binary; esbuild compiles its native helper).
onlyBuiltDependencies:
  - electron
  - esbuild

# Auto-approve builds for dependencies above so CI/non-interactive installs work.
allowBuilds:
  electron: true
  electron-winstaller: true
  esbuild: true
